<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Открытка для Алины</title>
    <style>
        /* ---------- ГЛОБАЛЬНЫЙ СТИЛЬ ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #1a0b1a 0%, #2d1a33 50%, #1a0b1a 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
            overflow-x: hidden;
        }

        /* ---------- КАРТОЧКА ---------- */
        .card {
            width: 100%;
            max-width: 560px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 48px 48px 32px 32px;
            padding: 40px 30px 45px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.3s ease, box-shadow 0.4s ease;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .card:hover {
            transform: scale(1.01) translateY(-4px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
        }

        /* ---------- ЗАГОЛОВОК ---------- */
        .greeting {
            font-size: 38px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            line-height: 1.2;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(255, 107, 157, 0.15);
        }

        /* ---------- КНОПКИ "ДА" И "НЕТ" ---------- */
        .choice-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .btn-choice {
            padding: 14px 44px;
            border-radius: 60px;
            font-size: 22px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.25s;
            user-select: none;
            min-width: 120px;
        }

        .btn-yes {
            background: linear-gradient(135deg, #ff6b9d, #c44b7a);
            color: #fff;
            box-shadow: 0 6px 25px rgba(255, 107, 157, 0.35);
        }

        .btn-yes:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 35px rgba(255, 107, 157, 0.5);
        }

        .btn-yes:active {
            transform: scale(0.94);
        }

        .btn-no {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: default;
        }

        .btn-no:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        /* ---------- СКРЫВАЕМАЯ ЧАСТЬ ---------- */
        .hidden-content {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.8s cubic-bezier(0.23, 1, 0.32, 1),
                opacity 0.6s ease,
                margin 0.4s ease;
            margin-top: 0;
        }

        .hidden-content.open {
            max-height: 400px;
            opacity: 1;
            margin-top: 28px;
        }

        .hidden-content .subtext {
            color: rgba(255, 255, 255, 0.75);
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 0.3px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .divider {
            width: 70px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 157, 0.4), transparent);
            margin: 10px auto 20px;
            border-radius: 4px;
        }

        /* ---------- КНОПКА С ЭМОДЗИ СЕРДЦА ---------- */
        .heart-btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 32px;
            background: linear-gradient(135deg, #ff6b9d, #c44b7a);
            box-shadow: 0 6px 25px rgba(255, 107, 157, 0.35);
            transition: 0.25s;
            border: none;
            cursor: pointer;
            line-height: 1;
            user-select: none;
        }

        .heart-btn:hover {
            transform: scale(1.12);
            box-shadow: 0 10px 35px rgba(255, 107, 157, 0.5);
        }

        .heart-btn:active {
            transform: scale(0.92);
        }

        /* ---------- ВСПЛЫВАЮЩАЯ КАРТИНКА ---------- */
        .popup-image {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            max-width: 80vw;
            max-height: 70vh;
            border-radius: 28px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 3px solid rgba(255, 255, 255, 0.15);
        }

        .popup-image.show {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ---------- ФОН ПОД КАРТИНКОЙ ---------- */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            z-index: 998;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .popup-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* ---------- БЛОК ВЫБОРА СОБЫТИЯ ---------- */
        .planning-block {
            display: none;
            margin-top: 25px;
            padding: 24px 20px 20px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            animation: fadeSlideUp 0.6s ease;
        }

        .planning-block.show {
            display: block;
        }

        @keyframes fadeSlideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .planning-block label {
            display: block;
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 8px;
            text-align: left;
        }

        /* ---------- ВЫПАДАЮЩИЙ СПИСОК ---------- */
        .custom-select {
            position: relative;
            width: 100%;
            margin-bottom: 20px;
        }

        .custom-select select {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.12);
            border-radius: 16px;
            color: #fff;
            font-size: 16px;
            font-family: inherit;
            appearance: none;
            -webkit-appearance: none;
            cursor: pointer;
            transition: 0.3s;
            outline: none;
        }

        .custom-select select:hover {
            border-color: rgba(255, 107, 157, 0.4);
        }

        .custom-select select:focus {
            border-color: #ff6b9d;
            box-shadow: 0 0 0 3px rgba(255, 107, 157, 0.15);
        }

        .custom-select select option {
            background: #2d1a33;
            color: #fff;
            padding: 10px;
        }

        .custom-select select option[value=""] {
            color: rgba(255, 255, 255, 0.5);
        }

        .custom-select::after {
            content: '▾';
            position: absolute;
            right: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgba(255, 255, 255, 0.4);
            font-size: 20px;
            pointer-events: none;
        }

        /* ---------- КАЛЕНДАРЬ (СВОЙ) ---------- */
        .calendar-container {
            margin-bottom: 16px;
        }

        .calendar-container label {
            margin-bottom: 8px;
        }

        .custom-calendar {
            background: rgba(255, 255, 255, 0.04);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 16px 12px 12px;
            user-select: none;
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            padding: 0 4px;
        }

        .calendar-header .month-year {
            color: #fff;
            font-size: 17px;
            font-weight: 600;
        }

        .calendar-header .nav-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.6);
            width: 34px;
            height: 34px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .calendar-header .nav-btn:hover {
            background: rgba(255, 255, 255, 0.12);
            color: #fff;
        }

        .calendar-header .nav-btn:active {
            transform: scale(0.92);
        }

        .calendar-weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
            margin-bottom: 6px;
        }

        .calendar-weekdays span {
            color: rgba(255, 255, 255, 0.35);
            font-size: 12px;
            font-weight: 600;
            text-align: center;
            padding: 4px 0;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .calendar-days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 3px;
        }

        .calendar-day {
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 15px;
            font-weight: 500;
            color: rgba(255, 255, 255, 0.5);
            background: transparent;
            transition: 0.2s;
            cursor: default;
            position: relative;
        }

        .calendar-day.available {
            color: #fff;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.03);
        }

        .calendar-day.available:hover {
            background: rgba(255, 107, 157, 0.2);
            transform: scale(1.05);
        }

        .calendar-day.available:active {
            transform: scale(0.92);
        }

        .calendar-day.selected {
            background: linear-gradient(135deg, #ff6b9d, #c44b7a) !important;
            color: #fff !important;
            box-shadow: 0 4px 15px rgba(255, 107, 157, 0.3);
            transform: scale(1.02);
        }

        .calendar-day.unavailable {
            color: rgba(255, 255, 255, 0.15);
            cursor: not-allowed;
            background: rgba(255, 80, 80, 0.03);
        }

        .calendar-day.other-month {
            opacity: 0.2;
        }

        .calendar-day.today {
            border: 1px solid rgba(255, 255, 255, 0.15);
        }

        .calendar-day.today.available {
            border-color: rgba(255, 107, 157, 0.3);
        }

        /* Подсказка под календарём */
        .calendar-hint {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.35);
            margin-top: 10px;
            text-align: left;
            font-weight: 300;
            letter-spacing: 0.3px;
            padding: 0 4px;
        }

        .calendar-hint span {
            color: rgba(255, 215, 0, 0.5);
        }

        .calendar-hint .active-days {
            color: rgba(100, 255, 150, 0.5);
        }

        /* ---------- ЯЧЕЙКА С ОТВЕТОМ ---------- */
        .result-box {
            margin-top: 20px;
            padding: 18px 20px;
            background: rgba(255, 107, 157, 0.08);
            border: 1px solid rgba(255, 107, 157, 0.2);
            border-radius: 16px;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }

        .result-box.has-result {
            background: rgba(255, 107, 157, 0.15);
            border-color: rgba(255, 107, 157, 0.4);
        }

        .result-box .result-text {
            color: #fff;
            font-size: 16px;
            font-weight: 400;
            line-height: 1.5;
        }

        .result-box .result-text .highlight {
            color: #ff9a9e;
            font-weight: 600;
        }

        .result-box .placeholder {
            color: rgba(255, 255, 255, 0.25);
            font-size: 14px;
        }

        /* ---------- ЧАСТИЦЫ ---------- */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.1);
            width: 4px;
            height: 4px;
            animation: float-particle linear infinite;
            z-index: 1;
        }

        @keyframes float-particle {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.7;
            }
            100% {
                transform: translateY(calc(100vh + 40px)) translateX(40px) scale(0.2);
                opacity: 0.1;
            }
        }

        /* ---------- АДАПТИВ ---------- */
        @media (max-width: 480px) {
            .card {
                padding: 32px 18px 35px;
                border-radius: 32px;
            }
            .greeting {
                font-size: 28px;
            }
            .btn-choice {
                padding: 12px 28px;
                font-size: 18px;
                min-width: 90px;
            }
            .hidden-content .subtext {
                font-size: 16px;
            }
            .heart-btn {
                font-size: 28px;
                padding: 12px 26px;
            }
            .popup-image {
                max-width: 92vw;
                max-height: 60vh;
            }
            .planning-block {
                padding: 16px 12px;
            }
            .custom-select select {
                font-size: 14px;
                padding: 12px 14px;
            }
            .custom-calendar {
                padding: 12px 6px 10px;
            }
            .calendar-day {
                font-size: 13px;
            }
            .calendar-weekdays span {
                font-size: 10px;
            }
            .result-box {
                min-height: 50px;
                padding: 14px 16px;
            }
            .result-box .result-text {
                font-size: 14px;
            }
            .calendar-hint {
                font-size: 12px;
            }
        }

        @media (max-width: 380px) {
            .calendar-day {
                font-size: 11px;
            }
        }
    </style>
</head>
<body>

    <!-- ====== ЧАСТИЦЫ ====== -->

    <!-- ====== ФОН ДЛЯ КАРТИНКИ ====== -->
    <div class="popup-overlay" id="popupOverlay"></div>

    <!-- ====== КАРТИНКА (всплывает) ====== -->
    <img class="popup-image" id="popupImage" src="" alt="Картинка" />

    <!-- ====== ОТКРЫТКА ====== -->
    <div class="card" id="card">

        <!-- ЗАГОЛОВОК -->
        <div class="greeting">✨ Алина самая лучшая на свете! ✨</div>

        <!-- КНОПКИ "ДА" и "НЕТ" -->
        <div class="choice-buttons">
            <button class="btn-choice btn-yes" id="btnYes">Да 💕</button>
            <button class="btn-choice btn-no" id="btnNo">Нет</button>
        </div>

        <!-- СКРЫВАЕМАЯ ЧАСТЬ -->
        <div class="hidden-content" id="hiddenContent">
            <div class="divider"></div>
            <div class="subtext">
                Нажми сюда, если хочешь свидание с Игорем
            </div>
            <button class="heart-btn" id="heartBtn">❤️</button>
        </div>

        <!-- ====== БЛОК ПЛАНИРОВАНИЯ ====== -->
        <div class="planning-block" id="planningBlock">

            <!-- ВЫБОР СОБЫТИЯ -->
            <div class="custom-select">
                <label for="eventSelect">🎯 Событие</label>
                <select id="eventSelect">
                    <option value="">— Выберите событие —</option>
                    <option value="Aquatoria">Aquatoria</option>
                    <option value="Глэмпинг у моря (выбираем вдвоем)">Глэмпинг у моря (выбираем вдвоем)</option>
                    <option value="Панда Парк">Панда Парк 🐼</option>
                    <option value="Ужин в ресторане">Ужин в ресторане</option>
                    <option value="Поход в кино">Поход в кино</option>
                    <option value="Катание на сапах">Катание на сапах</option>
                    <option value="Велопрогулка на Русском острове">Велопрогулка на Русском острове</option>
                </select>
            </div>

            <!-- ====== СВОЙ КАЛЕНДАРЬ ====== -->
            <div class="calendar-container">
                <label for="dateInput">📅 Дата</label>
                <div class="custom-calendar" id="customCalendar">
                    <div class="calendar-header">
                        <button class="nav-btn" id="prevMonth">◀</button>
                        <span class="month-year" id="monthYear">Июнь 2026</span>
                        <button class="nav-btn" id="nextMonth">▶</button>
                    </div>
                    <div class="calendar-weekdays">
                        <span>Пн</span>
                        <span>Вт</span>
                        <span>Ср</span>
                        <span>Чт</span>
                        <span>Пт</span>
                        <span>Сб</span>
                        <span>Вс</span>
                    </div>
                    <div class="calendar-days" id="calendarDays"></div>
                </div>
                <div class="calendar-hint">
                    📌 <span class="active-days">▬</span> Доступные дни (2/2: 2 дня доступны, 2 дня недоступны)
                </div>
            </div>

            <!-- ЯЧЕЙКА С ОТВЕТОМ -->
            <div class="result-box" id="resultBox">
                <span class="placeholder">Выберите событие и дату ✨</span>
            </div>

        </div>

    </div>

    <script>
        // ============ 1. ЧАСТИЦЫ ============
        (function createParticles() {
            const count = 45;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = 2 + Math.random() * 5;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = '-10px';
                p.style.animationDuration = 8 + Math.random() * 16 + 's';
                p.style.animationDelay = Math.random() * 18 + 's';
                p.style.opacity = 0.2 + Math.random() * 0.4;
                const hue = Math.random() * 60 + 320;
                p.style.background = `hsla(${hue}, 80%, 75%, 0.5)`;
                p.style.boxShadow = `0 0 ${6 + Math.random() * 20}px hsla(${hue}, 80%, 75%, 0.15)`;
                document.body.appendChild(p);
            }
        })();

        // ============ 2. КНОПКА "ДА" ============
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const hiddenContent = document.getElementById('hiddenContent');

        btnYes.addEventListener('click', function() {
            hiddenContent.classList.add('open');
            btnYes.style.opacity = '0.6';
            btnYes.style.cursor = 'default';
            btnYes.disabled = true;
        });

        // ============ 3. КНОПКА "НЕТ" ============
        btnNo.addEventListener('click', function() {
            btnNo.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btnNo.style.transform = '';
            }, 150);
        });

        // ============ 4. КНОПКА СЕРДЦА ============
        const heartBtn = document.getElementById('heartBtn');
        const popupImage = document.getElementById('popupImage');
        const popupOverlay = document.getElementById('popupOverlay');
        const planningBlock = document.getElementById('planningBlock');
        let imageTimer = null;
        let isImageShowing = false;

        const IMAGE_URL = 'https://raw.githubusercontent.com/Boltang-r/boltang-r.github.io/refs/heads/main/IMG_2150.jpeg';

        heartBtn.addEventListener('click', function(e) {
            e.stopPropagation();
            if (planningBlock.classList.contains('show')) return;
            if (isImageShowing) {
                clearTimeout(imageTimer);
                imageTimer = null;
                hideImage();
                setTimeout(() => showImage(), 100);
                return;
            }
            showImage();
        });

        function showImage() {
            isImageShowing = true;
            popupImage.src = IMAGE_URL;
            popupImage.classList.add('show');
            popupOverlay.classList.add('show');

            imageTimer = setTimeout(() => {
                hideImage();
                imageTimer = null;
                planningBlock.classList.add('show');
                renderCalendar(); // Показываем календарь
            }, 2000);
        }

        function hideImage() {
            isImageShowing = false;
            popupImage.classList.remove('show');
            popupOverlay.classList.remove('show');
            setTimeout(() => {
                popupImage.src = '';
            }, 400);
        }

        popupOverlay.addEventListener('click', function() {
            if (imageTimer) {
                clearTimeout(imageTimer);
                imageTimer = null;
            }
            hideImage();
            planningBlock.classList.add('show');
            renderCalendar();
        });

        // ============ 5. КАЛЕНДАРЬ 2/2 ============
        let currentMonth = new Date().getMonth();
        let currentYear = new Date().getFullYear();
        let selectedDate = null;
        const BASE_DAY = 24; // 24 июня
        const BASE_MONTH = 5; // июнь (0-индексация)

        // Проверка доступности даты (2/2)
        function isDateAvailable(year, month, day) {
            const date = new Date(year, month, day);
            const baseDate = new Date(year, BASE_MONTH, BASE_DAY);

            // Если дата раньше 24 июня — недоступна
            if (date < baseDate) {
                return false;
            }

            const diffTime = date.getTime() - baseDate.getTime();
            const diffDays = Math.floor(diffTime / (1000 * 60 * 60 * 24));
            const cycle = diffDays % 4;
            return cycle === 0 || cycle === 1;
        }

        function renderCalendar() {
            const daysContainer = document.getElementById('calendarDays');
            const monthYearEl = document.getElementById('monthYear');

            const firstDay = new Date(currentYear, currentMonth, 1);
            const lastDay = new Date(currentYear, currentMonth + 1, 0);
            const daysInMonth = lastDay.getDate();
            const startDayOfWeek = firstDay.getDay(); // 0=Вс, 1=Пн...

            // Названия месяцев
            const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь',
                'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'
            ];
            monthYearEl.textContent = `${monthNames[currentMonth]} ${currentYear}`;

            let html = '';

            // Пустые ячейки для дней до начала месяца
            // Сдвиг: Пн=0, Вс=6
            const offset = (startDayOfWeek === 0) ? 6 : startDayOfWeek - 1;

            for (let i = 0; i < offset; i++) {
                html += `<div class="calendar-day other-month"></div>`;
            }

            // Дни месяца
            const today = new Date();
            const todayDate = today.getDate();
            const todayMonth = today.getMonth();
            const todayYear = today.getFullYear();

            for (let day = 1; day <= daysInMonth; day++) {
                const available = isDateAvailable(currentYear, currentMonth, day);
                const isToday = (day === todayDate && currentMonth === todayMonth && currentYear === todayYear);
                const isSelected = (selectedDate && selectedDate.day === day &&
                    selectedDate.month === currentMonth && selectedDate.year === currentYear);

                let classes = 'calendar-day';
                if (available) classes += ' available';
                else classes += ' unavailable';
                if (isToday) classes += ' today';
                if (isSelected) classes += ' selected';

                const dataAttr = `data-day="${day}" data-month="${currentMonth}" data-year="${currentYear}"`;

                if (available) {
                    html += `<div class="${classes}" ${dataAttr} onclick="selectDate(${day}, ${currentMonth}, ${currentYear})">${day}</div>`;
                } else {
                    html += `<div class="${classes}">${day}</div>`;
                }
            }

            daysContainer.innerHTML = html;
        }

        // Выбор даты
        function selectDate(day, month, year) {
            selectedDate = { day, month, year };
            renderCalendar();
            updateResult();

            // Подсвечиваем поле выбора даты
            const dateInput = document.getElementById('dateInput');
            if (dateInput) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                dateInput.value = dateStr;
                dateInput.style.borderColor = 'rgba(100, 255, 150, 0.3)';
                dateInput.style.boxShadow = '0 0 20px rgba(100, 255, 150, 0.05)';
                setTimeout(() => {
                    dateInput.style.borderColor = '';
                    dateInput.style.boxShadow = '';
                }, 1000);
            }
        }

        // Навигация по месяцам
        document.getElementById('prevMonth').addEventListener('click', function() {
            currentMonth--;
            if (currentMonth < 0) {
                currentMonth = 11;
                currentYear--;
            }
            renderCalendar();
        });

        document.getElementById('nextMonth').addEventListener('click', function() {
            currentMonth++;
            if (currentMonth > 11) {
                currentMonth = 0;
                currentYear++;
            }
            renderCalendar();
        });

        // ============ 6. ЛОГИКА ВЫБОРА СОБЫТИЯ ============
        const eventSelect = document.getElementById('eventSelect');
        const resultBox = document.getElementById('resultBox');
        const dateInputHidden = document.getElementById('dateInput');
        let lastSelectedEvent = '';

        eventSelect.addEventListener('change', function() {
            const currentEvent = this.value;

            if (currentEvent !== lastSelectedEvent && lastSelectedEvent !== '') {
                // Сбрасываем выбранную дату
                selectedDate = null;
                renderCalendar();
            }

            lastSelectedEvent = currentEvent;

            if (currentEvent === 'Панда Парк') {
                const currentYear = new Date().getFullYear();
                // Проверяем, доступно ли 24 июня
                if (isDateAvailable(currentYear, 5, 24)) {
                    selectDate(24, 5, currentYear);
                } else {
                    // Если 24 июня недоступно (не должно случиться)
                    selectedDate = null;
                    renderCalendar();
                }
            }

            updateResult();
        });

        function updateResult() {
            const eventName = eventSelect.value;

            if (!eventName || !selectedDate) {
                resultBox.innerHTML = `<span class="placeholder">Выберите событие и дату ✨</span>`;
                resultBox.classList.remove('has-result');
                return;
            }

            const { day, month, year } = selectedDate;
            const dateObj = new Date(year, month, day);
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            const formattedDate = dateObj.toLocaleDateString('ru-RU', options);

            const displayEvent = eventName === 'Панда Парк' ? '🐼 Панда Парк' : eventName;

            resultBox.innerHTML = `
                <span class="result-text">
                    ✅ <span class="highlight">${displayEvent}</span> — <span class="highlight">${formattedDate}</span>
                </span>
            `;
            resultBox.classList.add('has-result');

            // Обновляем скрытый input для совместимости
            if (dateInputHidden) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                dateInputHidden.value = dateStr;
            }
        }

        // ============ 7. ИНИЦИАЛИЗАЦИЯ ============
        // Первый рендер календаря
        renderCalendar();

        console.log('💖 Открытка для Алины готова!');
        console.log('📸 Замени IMAGE_URL на свою картинку');
        console.log('🐼 Для "Панда Парк" дата автоматически 24 июня');
        console.log('📅 Календарь работает в режиме 2/2 начиная с 24 июня');
        console.log('   Доступны: 24,25 июня | 28,29 июня | 2,3 июля | и т.д.');
        console.log('✅ На iOS тоже работает!');
    </script>
</body>
</html>

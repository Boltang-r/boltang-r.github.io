<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Открытка для Алины</title>
    <style>
        /* ---------- ГЛОБАЛЬНЫЙ СТИЛЬ ---------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(145deg, #1a0b1a 0%, #2d1a33 50%, #1a0b1a 100%);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            padding: 20px;
            overflow: hidden;
        }

        /* ---------- КАРТОЧКА ---------- */
        .card {
            width: 100%;
            max-width: 520px;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border-radius: 48px 48px 32px 32px;
            padding: 40px 30px 45px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.7), 0 0 0 1px rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.08);
            transition: transform 0.3s ease, box-shadow 0.4s ease;
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .card:hover {
            transform: scale(1.01) translateY(-4px);
            box-shadow: 0 40px 80px rgba(0, 0, 0, 0.8);
        }

        /* ---------- ЗАГОЛОВОК ---------- */
        .greeting {
            font-size: 38px;
            font-weight: 700;
            background: linear-gradient(135deg, #ff9a9e, #fad0c4, #fbc2eb);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            line-height: 1.2;
            margin-bottom: 20px;
            text-shadow: 0 0 40px rgba(255, 107, 157, 0.15);
        }

        /* ---------- КНОПКИ "ДА" И "НЕТ" ---------- */
        .choice-buttons {
            display: flex;
            gap: 16px;
            justify-content: center;
            flex-wrap: wrap;
            margin-bottom: 10px;
        }

        .btn-choice {
            padding: 14px 44px;
            border-radius: 60px;
            font-size: 22px;
            font-weight: 700;
            border: none;
            cursor: pointer;
            transition: 0.25s;
            user-select: none;
            min-width: 120px;
        }

        .btn-yes {
            background: linear-gradient(135deg, #ff6b9d, #c44b7a);
            color: #fff;
            box-shadow: 0 6px 25px rgba(255, 107, 157, 0.35);
        }

        .btn-yes:hover {
            transform: scale(1.08);
            box-shadow: 0 10px 35px rgba(255, 107, 157, 0.5);
        }

        .btn-yes:active {
            transform: scale(0.94);
        }

        .btn-no {
            background: rgba(255, 255, 255, 0.08);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            cursor: default;
        }

        .btn-no:hover {
            background: rgba(255, 255, 255, 0.03);
        }

        /* ---------- СКРЫВАЕМАЯ ЧАСТЬ (открывается по "Да") ---------- */
        .hidden-content {
            max-height: 0;
            opacity: 0;
            overflow: hidden;
            transition: max-height 0.8s cubic-bezier(0.23, 1, 0.32, 1),
                opacity 0.6s ease,
                margin 0.4s ease;
            margin-top: 0;
        }

        .hidden-content.open {
            max-height: 600px;
            opacity: 1;
            margin-top: 28px;
        }

        .hidden-content .subtext {
            color: rgba(255, 255, 255, 0.75);
            font-size: 18px;
            font-weight: 300;
            letter-spacing: 0.3px;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        .divider {
            width: 70px;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 107, 157, 0.4), transparent);
            margin: 10px auto 20px;
            border-radius: 4px;
        }

        /* ---------- КНОПКА С ЭМОДЗИ СЕРДЦА ---------- */
        .heart-btn {
            display: inline-block;
            padding: 14px 32px;
            border-radius: 60px;
            font-size: 32px;
            background: linear-gradient(135deg, #ff6b9d, #c44b7a);
            box-shadow: 0 6px 25px rgba(255, 107, 157, 0.35);
            transition: 0.25s;
            border: none;
            cursor: pointer;
            line-height: 1;
            user-select: none;
        }

        .heart-btn:hover {
            transform: scale(1.12);
            box-shadow: 0 10px 35px rgba(255, 107, 157, 0.5);
        }

        .heart-btn:active {
            transform: scale(0.92);
        }

        /* ---------- ВСПЛЫВАЮЩАЯ КАРТИНКА ---------- */
        .popup-image {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0.7);
            max-width: 80vw;
            max-height: 70vh;
            border-radius: 28px;
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.9);
            z-index: 999;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            border: 3px solid rgba(255, 255, 255, 0.15);
        }

        .popup-image.show {
            opacity: 1;
            pointer-events: auto;
            transform: translate(-50%, -50%) scale(1);
        }

        /* ---------- ФОН ПОД КАРТИНКОЙ ---------- */
        .popup-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(6px);
            z-index: 998;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .popup-overlay.show {
            opacity: 1;
            pointer-events: auto;
        }

        /* ---------- ЧАСТИЦЫ ---------- */
        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            background: rgba(255, 255, 255, 0.5);
            box-shadow: 0 0 12px rgba(255, 255, 255, 0.1);
            width: 4px;
            height: 4px;
            animation: float-particle linear infinite;
            z-index: 1;
        }

        @keyframes float-particle {
            0% {
                transform: translateY(0) translateX(0) scale(1);
                opacity: 0.7;
            }
            100% {
                transform: translateY(calc(100vh + 40px)) translateX(40px) scale(0.2);
                opacity: 0.1;
            }
        }

        /* ---------- АДАПТИВ ---------- */
        @media (max-width: 480px) {
            .card {
                padding: 32px 18px 35px;
                border-radius: 32px;
            }
            .greeting {
                font-size: 28px;
            }
            .btn-choice {
                padding: 12px 28px;
                font-size: 18px;
                min-width: 90px;
            }
            .hidden-content .subtext {
                font-size: 16px;
            }
            .heart-btn {
                font-size: 28px;
                padding: 12px 26px;
            }
            .popup-image {
                max-width: 92vw;
                max-height: 60vh;
            }
        }
    </style>
</head>
<body>

    <!-- ====== ЧАСТИЦЫ ====== -->

    <!-- ====== ФОН ДЛЯ КАРТИНКИ ====== -->
    <div class="popup-overlay" id="popupOverlay"></div>

    <!-- ====== КАРТИНКА (всплывает) ====== -->
    <img class="popup-image" id="popupImage" src="" alt="Картинка" />

    <!-- ====== ОТКРЫТКА ====== -->
    <div class="card" id="card">

        <!-- ЗАГОЛОВОК -->
        <div class="greeting">✨ Алина самая лучшая на свете! ✨</div>

        <!-- КНОПКИ "ДА" и "НЕТ" -->
        <div class="choice-buttons">
            <button class="btn-choice btn-yes" id="btnYes">Да 💕</button>
            <button class="btn-choice btn-no" id="btnNo">Нет</button>
        </div>

        <!-- СКРЫВАЕМАЯ ЧАСТЬ (открывается по "Да") -->
        <div class="hidden-content" id="hiddenContent">
            <div class="divider"></div>
            <div class="subtext">
                Нажми сюда, если хочешь свидание с Игорем
            </div>
            <!-- КНОПКА С ЭМОДЗИ СЕРДЦА -->
            <button class="heart-btn" id="heartBtn">❤️</button>
        </div>

    </div>

    <script>
        // ============ 1. ЧАСТИЦЫ ============
        (function createParticles() {
            const count = 45;
            for (let i = 0; i < count; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = 2 + Math.random() * 5;
                p.style.width = size + 'px';
                p.style.height = size + 'px';
                p.style.left = Math.random() * 100 + '%';
                p.style.top = '-10px';
                p.style.animationDuration = 8 + Math.random() * 16 + 's';
                p.style.animationDelay = Math.random() * 18 + 's';
                p.style.opacity = 0.2 + Math.random() * 0.4;
                const hue = Math.random() * 60 + 320;
                p.style.background = `hsla(${hue}, 80%, 75%, 0.5)`;
                p.style.boxShadow = `0 0 ${6 + Math.random() * 20}px hsla(${hue}, 80%, 75%, 0.15)`;
                document.body.appendChild(p);
            }
        })();

        // ============ 2. КНОПКА "ДА" — РАСКРЫВАЕМ ОТКРЫТКУ ============
        const btnYes = document.getElementById('btnYes');
        const btnNo = document.getElementById('btnNo');
        const hiddenContent = document.getElementById('hiddenContent');

        btnYes.addEventListener('click', function() {
            hiddenContent.classList.add('open');
            // Делаем кнопки чуть менее заметными, но оставляем
            btnYes.style.opacity = '0.6';
            btnYes.style.cursor = 'default';
            btnYes.disabled = true;
        });

        // ============ 3. КНОПКА "НЕТ" — НИЧЕГО НЕ ДЕЛАЕТ ============
        btnNo.addEventListener('click', function() {
            // Абсолютно ничего не происходит
            // Но можно добавить лёгкую анимацию для забавы (по желанию)
            btnNo.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btnNo.style.transform = '';
            }, 150);
        });

        // ============ 4. КНОПКА СЕРДЦА → КАРТИНКА ============
        const heartBtn = document.getElementById('heartBtn');
        const popupImage = document.getElementById('popupImage');
        const popupOverlay = document.getElementById('popupOverlay');
        let imageTimer = null;

        // ⚠️ ВСТАВЬТЕ СВОЮ ССЫЛКУ НА КАРТИНКУ ВМЕСТО ЭТОЙ:
        const IMAGE_URL = 'https://raw.githubusercontent.com/Boltang-r/boltang-r.github.io/refs/heads/main/IMG_2150.jpeg';

        heartBtn.addEventListener('click', function(e) {
            e.stopPropagation();

            if (imageTimer) {
                clearTimeout(imageTimer);
                imageTimer = null;
                hideImage();
                setTimeout(() => showImage(), 100);
                return;
            }

            showImage();
        });

        function showImage() {
            popupImage.src = IMAGE_URL;
            popupImage.classList.add('show');
            popupOverlay.classList.add('show');

            imageTimer = setTimeout(() => {
                hideImage();
                imageTimer = null;
            }, 2000);
        }

        function hideImage() {
            popupImage.classList.remove('show');
            popupOverlay.classList.remove('show');
            setTimeout(() => {
                popupImage.src = '';
            }, 400);
        }

        popupOverlay.addEventListener('click', function() {
            if (imageTimer) {
                clearTimeout(imageTimer);
                imageTimer = null;
            }
            hideImage();
        });

        // ============ 5. БОНУС ============
        console.log('💖 Открытка для Алины готова!');
        console.log('📸 Замени IMAGE_URL на свою картинку (строка ~230)');
    </script>
</body>
</html>
